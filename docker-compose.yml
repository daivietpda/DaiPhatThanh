services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  web-controller:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-controller
    restart: unless-stopped
    depends_on:
      - mqtt-broker
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - ./mqtt-config.json:/app/mqtt-config.json:rw
      - ./boxes.json:/app/boxes.json:rw
      - ./channels.json:/app/channels.json:rw
      - ./schedules.json:/app/schedules.json:rw

volumes:
  mosquitto_data:
  mosquitto_log:
